repos:
  - repo: local
    hooks:
      - id: ruff-format
        name: Ruff format
        entry: .venv/bin/ruff format
        language: system
        types: [python]

      - id: ruff-check
        name: Ruff lint
        entry: .venv/bin/ruff check
        language: system
        types: [python]

      - id: pylint
        name: Pylint
        entry: .venv/bin/pylint code-index second-brain/scripts scripts tests --fail-under=10.0
        language: system
        pass_filenames: false
        always_run: true

      - id: rustfmt
        name: Rust format check
        entry: cargo fmt --check
        language: system
        pass_filenames: false
        files: ^(Cargo\.toml|Cargo\.lock|src/|rust-toolchain\.toml)

      - id: shellcheck
        name: Shell syntax check
        entry: bash -n
        language: system
        files: ^scripts/.*\.sh$
