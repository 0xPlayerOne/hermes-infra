[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--strict-markers --strict-config"
markers = ["live: requires local Hermes launchd services"]

[tool.coverage.run]
branch = true
source = ["code-index", "scripts", "second-brain/scripts"]
omit = ["tests/*"]

[tool.coverage.report]
show_missing = true
skip_covered = true
exclude_also = ["if __name__ == .__main__.:"]
